# --- HTTP → REDIRECT vers HTTPS ---
server {
    listen 80;
    server_name nextcloud.noschoixpourvous.com www.nextcloud.noschoixpourvous.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirection vers domaine principal en HTTPS
    location / {
        return 301 https://nextcloud.noschoixpourvous.com$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    server_name nextcloud.noschoixpourvous.com www.nextcloud.noschoixpourvous.com;
    client_max_body_size 200G;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Certificats Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/nextcloud.noschoixpourvous.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextcloud.noschoixpourvous.com/privkey.pem;

    # Sécurité SSL standard
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirection www → non-www même en HTTPS
    if ($host = www.nextcloud.noschoixpourvous.com) {
        return 301 https://nextcloud.noschoixpourvous.com$request_uri;
    }

    # Proxy vers Nextcloud
    location / {
        proxy_pass http://nextcloud:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Support WebSocket (nécessaire pour Collabora Online / Talk)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
